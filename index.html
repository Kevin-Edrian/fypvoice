<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYPVoice - AI Affiliate Voice Generator</title>
    <!-- Memuat Tailwind CSS untuk Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Memuat Babel untuk menerjemahkan JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- KOMPONEN IKON (Menggantikan library eksternal agar aman di GitHub Pages) ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                Mic: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>,
                Box: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>,
                Bot: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>,
                Loader2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
                Settings2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="7" cy="17" r="3"/></svg>,
                UserRound: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>,
                Wand2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>,
                Sparkles: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
                Copy: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
                CheckCircle2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                Activity: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                Play: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} fill-current`}><polygon points="5 3 19 12 5 21 5 3"/></svg>,
                Square: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} fill-current`}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
            };
            return icons[name] || null;
        };

        // --- FUNGSI AUDIO CONVERTER ---
        function pcmToWav(base64Pcm, sampleRate = 24000) {
            const binaryString = atob(base64Pcm);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const buffer = new ArrayBuffer(44 + bytes.length);
            const view = new DataView(buffer);
            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + bytes.length, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, bytes.length, true);

            const dataView = new Uint8Array(buffer, 44);
            dataView.set(bytes);
            return URL.createObjectURL(new Blob([view], { type: 'audio/wav' }));
        }

        const AI_VOICES = [
            { id: 'Kore', name: 'Kore (Wanita, Ramah & Jelas)' },
            { id: 'Aoede', name: 'Aoede (Wanita, Elegan & Tenang)' },
            { id: 'Fenrir', name: 'Fenrir (Pria, Semangat & Tegas)' },
            { id: 'Zephyr', name: 'Zephyr (Pria, Berwibawa & Dalam)' },
            { id: 'Puck', name: 'Puck (Pria, Ceria & Santai)' }
        ];

        // --- KOMPONEN UTAMA APLIKASI ---
        function App() {
            const [productName, setProductName] = useState('Headphone Wireless X1');
            const [description, setDescription] = useState('Nikmati kualitas suara premium dengan bass yang mendalam. Baterai tahan hingga 24 jam, cocok untuk menemani aktivitas harianmu.');
            const [callToAction, setCallToAction] = useState('Klik keranjang kuning sekarang juga untuk dapatkan diskon spesial!');
            
            const [selectedVoice, setSelectedVoice] = useState('Kore');
            const [rate, setRate] = useState(1);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [isGeneratingAudio, setIsGeneratingAudio] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [activePreset, setActivePreset] = useState('normal');
            const [isEnhancing, setIsEnhancing] = useState(false);
            const [apiError, setApiError] = useState('');
            
            const audioRef = useRef(new Audio());
            const [lastGenerated, setLastGenerated] = useState({ text: '', voice: '', style: '' });

            // ========================================================
            // MASUKKAN API KEY ANDA DI DALAM TANDA KUTIP DI BAWAH INI
            // ========================================================
            const apiKey = ""; 

            const fullScript = `${productName}. ${description} ${callToAction}`;

            const handleEnhanceWithAI = async () => {
                if (!apiKey) { setApiError('API Key belum diisi di dalam kode!'); return; }
                if (!productName && !description && !callToAction) return;
                
                setIsEnhancing(true); setApiError('');

                const prompt = `Perbaiki kalimat promosi ini menjadi sangat menarik, persuasif, untuk konten TikTok/Reels.\nNama: ${productName}\nDeskripsi: ${description}\nCTA: ${callToAction}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "Anda copywriter TikTok. Rombak teks jadi engaging dan natural diucapkan. Gunakan bahasa gaul Indonesia." }] },
                    generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { productName: { type: "STRING" }, description: { type: "STRING" }, callToAction: { type: "STRING" } } } }
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        const result = JSON.parse(text);
                        if (result.productName) setProductName(result.productName);
                        if (result.description) setDescription(result.description);
                        if (result.callToAction) setCallToAction(result.callToAction);
                        setLastGenerated({ text: '', voice: '', style: '' });
                    }
                } catch (error) {
                    setApiError('Gagal merombak teks: ' + error.message);
                } finally { setIsEnhancing(false); }
            };

            const handlePlay = async () => {
                if (!apiKey) { setApiError('API Key belum diisi di dalam kode!'); return; }
                if (isSpeaking) {
                    audioRef.current.pause(); audioRef.current.currentTime = 0; setIsSpeaking(false); return;
                }
                if (fullScript.trim() === '') return;

                const stylePrefix = activePreset === 'energetic' ? 'Say excitedly and energetically: ' : activePreset === 'calm' ? 'Say calmly, softly, and slowly: ' : '';
                const textToGenerate = stylePrefix + fullScript;

                if (lastGenerated.text === textToGenerate && lastGenerated.voice === selectedVoice && audioRef.current.src) {
                    audioRef.current.playbackRate = rate; audioRef.current.play(); setIsSpeaking(true); return;
                }

                setIsGeneratingAudio(true); setApiError('');
                const payload = {
                    contents: [{ parts: [{ text: textToGenerate }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: selectedVoice } } } },
                    model: "gemini-2.5-flash-preview-tts"
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);

                    const pcmData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    const wavUrl = pcmToWav(pcmData, 24000);
                    
                    audioRef.current.src = wavUrl;
                    audioRef.current.playbackRate = rate;
                    audioRef.current.onended = () => setIsSpeaking(false);
                    
                    setLastGenerated({ text: textToGenerate, voice: selectedVoice, style: activePreset });
                    await audioRef.current.play();
                    setIsSpeaking(true);
                } catch (error) {
                    setApiError('Gagal membuat suara: ' + error.message);
                } finally { setIsGeneratingAudio(false); }
            };

            const handleStop = () => { audioRef.current.pause(); audioRef.current.currentTime = 0; setIsSpeaking(false); };
            const handleCopy = () => {
                // Workaround for clipboard in some environments
                const textArea = document.createElement("textarea");
                textArea.value = fullScript;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); setIsCopied(true); setTimeout(() => setIsCopied(false), 2000); } catch (err) {}
                document.body.removeChild(textArea);
            };

            const applyPreset = (type) => {
                setActivePreset(type);
                if(type === 'energetic') setRate(1.1);
                else if(type === 'calm') setRate(0.9);
                else setRate(1.0);
            };

            return (
                <div className="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-purple-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-5xl mx-auto space-y-8">
                        
                        <div className="text-center space-y-3 mb-10 mt-4">
                            <div className="inline-flex items-center justify-center p-4 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg shadow-indigo-200/50 mb-4 transform transition-transform hover:scale-105 relative">
                                <Icon name="Mic" className="w-10 h-10 text-white" />
                                <div className="absolute -top-2 -right-2 bg-amber-400 text-[10px] font-black text-amber-900 px-2 py-1 rounded-full animate-bounce">PRO</div>
                            </div>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-700 to-purple-700 tracking-tight">
                                FYPVoice AI
                            </h1>
                            <p className="text-slate-500 max-w-xl mx-auto text-lg">
                                Sulap teks produk Anda menjadi narasi suara <b>seperti manusia sungguhan</b> untuk konten TikTok/Reels.
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-7 space-y-6">
                                <div className="bg-white/80 backdrop-blur-xl p-6 md:p-8 rounded-3xl shadow-xl shadow-slate-200/40 border border-white space-y-6 relative overflow-hidden">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-slate-100 pb-4">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800">
                                            <Icon name="Box" className="w-6 h-6 text-indigo-500" /> Data Produk
                                        </h2>
                                        <button onClick={handleEnhanceWithAI} disabled={isEnhancing} className="flex items-center justify-center gap-2 bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-orange-200 transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                                            {isEnhancing ? <Icon name="Loader2" className="w-4 h-4" /> : <Icon name="Bot" className="w-4 h-4" />}
                                            {isEnhancing ? 'Meracik...' : 'Perbagus dengan AI'}
                                        </button>
                                    </div>

                                    {apiError && <div className="bg-red-50 text-red-600 text-sm p-4 rounded-xl border border-red-100"><b>Error:</b> {apiError}</div>}
                                    
                                    <div className="space-y-5">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Nama Produk</label>
                                            <input type="text" value={productName} onChange={(e) => {setProductName(e.target.value); setLastGenerated(prev => ({...prev, text: ''}));}} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Highlight & Keunggulan</label>
                                            <textarea value={description} onChange={(e) => {setDescription(e.target.value); setLastGenerated(prev => ({...prev, text: ''}));}} rows="4" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2">Call to Action</label>
                                            <input type="text" value={callToAction} onChange={(e) => {setCallToAction(e.target.value); setLastGenerated(prev => ({...prev, text: ''}));}} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-white/80 backdrop-blur-xl p-6 md:p-8 rounded-3xl shadow-xl shadow-slate-200/40 border border-white space-y-6">
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-slate-800">
                                        <Icon name="Settings2" className="w-6 h-6 text-purple-500" /> Pengaturan Suara
                                    </h2>
                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-1.5"><Icon name="UserRound" className="w-4 h-4 text-slate-500" /> Pilih Narator AI</label>
                                            <select value={selectedVoice} onChange={(e) => setSelectedVoice(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-purple-500 font-semibold outline-none">
                                                {AI_VOICES.map(v => <option key={v.id} value={v.id}>{v.name}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2"><Icon name="Wand2" className="w-4 h-4 text-amber-500" /> Gaya Emosi</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                <button onClick={() => applyPreset('normal')} className={`py-2 px-2 text-xs font-semibold rounded-lg border ${activePreset === 'normal' ? 'bg-indigo-50 border-indigo-200 text-indigo-700' : 'bg-white text-slate-500'}`}>Normal</button>
                                                <button onClick={() => applyPreset('energetic')} className={`py-2 px-2 text-xs font-semibold rounded-lg border ${activePreset === 'energetic' ? 'bg-orange-50 border-orange-200 text-orange-700' : 'bg-white text-slate-500'}`}>Semangat 🔥</button>
                                                <button onClick={() => applyPreset('calm')} className={`py-2 px-2 text-xs font-semibold rounded-lg border ${activePreset === 'calm' ? 'bg-teal-50 border-teal-200 text-teal-700' : 'bg-white text-slate-500'}`}>Tenang ☕</button>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="text-sm font-semibold text-slate-700">Kecepatan</label>
                                                <span className="text-xs font-bold text-indigo-600 bg-indigo-100 px-2 py-1 rounded-md">{rate}x</span>
                                            </div>
                                            <input type="range" min="0.5" max="2" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none accent-indigo-600" />
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-br from-indigo-900 to-purple-900 p-1 rounded-3xl shadow-2xl">
                                    <div className="bg-white rounded-[22px] p-6 space-y-5">
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                                            <h2 className="text-lg font-bold flex items-center gap-2 text-slate-800"><Icon name="Sparkles" className="w-5 h-5 text-amber-400" /> Skrip Final</h2>
                                            <button onClick={handleCopy} className="text-slate-400 hover:text-indigo-600 flex items-center gap-1 text-sm font-medium">
                                                {isCopied ? <Icon name="CheckCircle2" className="w-4 h-4 text-green-500" /> : <Icon name="Copy" className="w-4 h-4" />}
                                                {isCopied ? <span className="text-green-500">Tersalin!</span> : 'Salin'}
                                            </button>
                                        </div>
                                        <div className="relative">
                                            <div className="p-4 bg-slate-50 rounded-xl border border-slate-100 text-sm italic min-h-[100px]">"{fullScript}"</div>
                                        </div>
                                        <div className="pt-2">
                                            <div className={`flex justify-center items-center gap-1 h-8 mb-4 ${isSpeaking ? 'opacity-100' : 'opacity-10'}`}>
                                                {[1, 2, 3, 4, 5, 4, 3, 2, 1].map((val, i) => <div key={i} className="w-1.5 bg-indigo-500 rounded-full animate-pulse" style={{ height: isSpeaking ? `${val * 6}px` : '4px', animationDelay: `${i * 0.1}s` }}></div>)}
                                            </div>
                                            <div className="flex gap-3">
                                                <button onClick={handlePlay} disabled={isGeneratingAudio} className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-xl font-bold text-white transition-all ${isGeneratingAudio ? 'bg-slate-400' : isSpeaking ? 'bg-indigo-400' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:shadow-lg hover:shadow-indigo-300'}`}>
                                                    {isGeneratingAudio ? <><Icon name="Loader2" className="w-5 h-5" /> Proses...</> : isSpeaking ? <><Icon name="Activity" className="w-5 h-5" /> Membaca...</> : <><Icon name="Play" className="w-5 h-5" /> Putar Suara</>}
                                                </button>
                                                <button onClick={handleStop} disabled={!isSpeaking && !isGeneratingAudio} className={`flex items-center justify-center py-3 px-5 rounded-xl font-bold transition-all ${!isSpeaking && !isGeneratingAudio ? 'bg-slate-100 text-slate-400' : 'bg-red-50 text-red-600 border border-red-200'}`}>
                                                    <Icon name="Square" className="w-5 h-5" />
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- RENDER APLIKASI ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
