<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYPVoice - AI Copywriter & TTS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .shimmer { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- UI COMPONENTS ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                Sparkles: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
                Loader2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} animate-spin`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
                Copy: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
                CheckCircle2: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>,
                Download: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
                Activity: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
                Play: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} fill-current`}><polygon points="5 3 19 12 5 21 5 3"/></svg>,
                Square: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`${className} fill-current`}><rect width="14" height="14" x="5" y="5" rx="2"/></svg>,
                AlertCircle: <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [productName, setProductName] = useState('');
            const [description, setDescription] = useState('');
            const [callToAction, setCallToAction] = useState('');
            const [selectedVoice, setSelectedVoice] = useState('Kore');
            const [activePreset, setActivePreset] = useState('Normal');
            const [rate, setRate] = useState(1.0);
            const [isSpeaking, setIsSpeaking] = useState(false);
            const [isGeneratingAudio, setIsGeneratingAudio] = useState(false);
            const [isCopied, setIsCopied] = useState(false);
            const [isEnhancing, setIsEnhancing] = useState(false);
            const [apiError, setApiError] = useState('');
            const [audioUrl, setAudioUrl] = useState(null);
            const [lastGenerated, setLastGenerated] = useState({ text: '', voice: '', style: '' });
            
            const audioRef = useRef(new Audio());
            const apiKey = "AIzaSyBM4pEzXyAuiTnbYfVoFjIMgtXAlQXOu9c"; // API KEY ANDA

            const fullScript = `${productName}. ${description} ${callToAction}`;

            // --- FUNGSI PEROMBAK TEKS (DENGAN CADANGAN OFFLINE) ---
            const handleEnhanceWithAI = async () => {
                if (!apiKey) { setApiError('API Key belum diisi!'); return; }
                if (!productName && !description && !callToAction) return;
                
                setIsEnhancing(true); 
                setApiError('');

                const prompt = `Anda copywriter TikTok. Perbaiki kalimat promosi ini menjadi sangat menarik, persuasif, dan natural diucapkan (bahasa gaul Indonesia).
                Balas HANYA dengan format JSON: {"productName": "nama baru", "description": "deskripsi baru", "callToAction": "cta baru"}`;

                const payload = { contents: [{ parts: [{ text: `${prompt}\n\nProduk: ${productName}\nDesk: ${description}\nCTA: ${callToAction}` }] }] };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(payload) 
                    });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);
                    
                    let text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                        const result = JSON.parse(text);
                        setProductName(result.productName);
                        setDescription(result.description);
                        setCallToAction(result.callToAction);
                        setIsEnhancing(false);
                    }
                } catch (error) {
                    console.warn("Menggunakan AI Cadangan...");
                    const nameMods = ["Promo Viral", "Diskon Gila", "Wajib Punya", "Racun TikTok"];
                    const dPrefix = ["Jujur ini bagus banget woy!", "Sumpah ya, ini tuh racun banget!", "Plis kalian wajib tau barang ini!"];
                    const dSuffix = ["Kualitasnya di luar nurul, wajib punya! 😍", "Harganya affordable banget, auto checkout! 💸", "Jangan sampai nyesel kehabisan ya! ✨"];
                    const ctaT = ["🔥 Klik keranjang kuning sekarang! 🔥", "👇 Checkout mumpung lagi flash sale! 👇", "🛒 Gas klik keranjang kuning bestie! 🛒"];
                    
                    const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

                    setTimeout(() => {
                        setProductName(`✨ ${productName.replace(/✨/g, '')} (${rand(nameMods)}) ✨`);
                        setDescription(`${rand(dPrefix)} ${description} ${rand(dSuffix)}`);
                        setCallToAction(rand(ctaT));
                        setIsEnhancing(false);
                    }, 1200);
                }
            };

            // --- FUNGSI AUDIO (TTS & DOWNLOAD) ---
            const pcmToWav = (base64Pcm, sampleRate) => {
                const binaryStr = atob(base64Pcm);
                const len = binaryStr.length;
                const buffer = new ArrayBuffer(44 + len);
                const view = new DataView(buffer);
                const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
                writeString(0, 'RIFF');
                view.setUint32(4, 36 + len, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, len, true);
                for (let i = 0; i < len; i++) view.setUint8(44 + i, binaryStr.charCodeAt(i));
                return URL.createObjectURL(new Blob([buffer], { type: 'audio/wav' }));
            };

            const handlePlay = async () => {
                if (!fullScript.trim()) return;
                setIsGeneratingAudio(true); setApiError('');
                
                const payload = { contents: [{ parts: [{ text: fullScript }] }], generationConfig: { speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: selectedVoice } } } } };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    if(data.error) throw new Error(data.error.message);

                    const pcmData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                    const wavUrl = pcmToWav(pcmData, 24000);
                    
                    setAudioUrl(wavUrl);
                    audioRef.current.src = wavUrl;
                    audioRef.current.playbackRate = rate;
                    await audioRef.current.play();
                    setIsSpeaking(true);
                    audioRef.current.onended = () => setIsSpeaking(false);
                } catch (error) {
                    setApiError('Limit API Habis. Memakai Suara Cadangan Laptop...');
                    const ut = new SpeechSynthesisUtterance(fullScript);
                    ut.lang = 'id-ID';
                    if (selectedVoice === 'Fenrir') ut.pitch = 0.5; 
                    else if (selectedVoice === 'Kore') ut.pitch = 1.3;
                    else ut.pitch = 1.0;
                    ut.rate = rate;
                    ut.onend = () => setIsSpeaking(false);
                    window.speechSynthesis.speak(ut);
                    setIsSpeaking(true);
                } finally { setIsGeneratingAudio(false); }
            };

            const handleStop = () => { audioRef.current.pause(); window.speechSynthesis.cancel(); setIsSpeaking(false); };
            
            const handleDownload = () => {
                if (!audioUrl) return;
                const a = document.createElement('a');
                a.href = audioUrl;
                a.download = `FYPVoice_${selectedVoice}.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(fullScript);
                setIsCopied(true);
                setTimeout(() => setIsCopied(false), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex justify-center items-start">
                    <div className="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* LEFT: INPUT AREA */}
                        <div className="lg:col-span-7 space-y-6">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-2 bg-indigo-600 rounded-lg text-white"><Icon name="Sparkles" className="w-6 h-6" /></div>
                                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">FYP<span className="text-indigo-600">Voice</span></h1>
                            </div>

                            <div className="glass rounded-3xl p-6 shadow-xl border-white">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="font-bold text-slate-700 flex items-center gap-2"><Icon name="Activity" /> Editor Skrip Promo</h2>
                                    <button onClick={handleEnhanceWithAI} disabled={isEnhancing} className="flex items-center gap-2 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-full text-sm font-bold hover:bg-indigo-100 transition-colors disabled:opacity-50">
                                        {isEnhancing ? <Icon name="Loader2" /> : <Icon name="Sparkles" />} {isEnhancing ? 'Menganalisis...' : 'Perbagus dengan AI'}
                                    </button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div><label className="text-xs font-bold text-slate-400 uppercase ml-1">Nama Produk</label>
                                    <input value={productName} onChange={(e) => setProductName(e.target.value)} className="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition-all font-semibold" placeholder="Contoh: Basreng Pedas Daun Jeruk" /></div>
                                    
                                    <div><label className="text-xs font-bold text-slate-400 uppercase ml-1">Deskripsi & Keunggulan</label>
                                    <textarea value={description} onChange={(e) => setDescription(e.target.value)} className="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition-all min-h-[120px]" placeholder="Sebutkan kenapa orang harus beli produkmu..." /></div>
                                    
                                    <div><label className="text-xs font-bold text-slate-400 uppercase ml-1">Call to Action (CTA)</label>
                                    <input value={callToAction} onChange={(e) => setCallToAction(e.target.value)} className="w-full mt-1 p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Contoh: Cek keranjang kuning sekarang!" /></div>
                                </div>

                                {apiError && <div className="mt-4 p-3 bg-amber-50 border border-amber-100 text-amber-700 rounded-xl text-sm flex items-center gap-2"><Icon name="AlertCircle" /> {apiError}</div>}
                            </div>
                        </div>

                        {/* RIGHT: CONTROL AREA */}
                        <div className="lg:col-span-5 space-y-6">
                            <div className="glass rounded-3xl p-6 shadow-xl sticky top-8">
                                <h2 className="font-bold text-slate-700 mb-6 flex items-center gap-2"><Icon name="Play" /> Pengaturan Suara</h2>
                                
                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {['Kore', 'Fenrir', 'Aoede', 'Puck'].map(v => (
                                        <button key={v} onClick={() => setSelectedVoice(v)} className={`p-4 rounded-2xl border-2 transition-all text-left ${selectedVoice === v ? 'border-indigo-600 bg-indigo-50' : 'border-slate-100 hover:border-slate-200'}`}>
                                            <div className="font-bold text-slate-800">{v}</div>
                                            <div className="text-[10px] text-slate-500 uppercase">{v === 'Fenrir' ? 'Suara Pria' : 'Suara Wanita'}</div>
                                        </button>
                                    ))}
                                </div>

                                <div className="mb-8">
                                    <div className="flex justify-between text-sm font-bold mb-3"><span className="text-slate-500">Kecepatan Bicara</span><span className="text-indigo-600">{rate}x</span></div>
                                    <input type="range" min="0.5" max="2.0" step="0.1" value={rate} onChange={(e) => setRate(parseFloat(e.target.value))} className="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                </div>

                                <div className="p-6 bg-slate-900 rounded-3xl text-white shadow-inner mb-6">
                                    <div className={`flex justify-center items-center gap-1 h-8 mb-4 ${isSpeaking ? 'opacity-100' : 'opacity-10'}`}>
                                        {[1, 2, 3, 4, 5, 4, 3, 2, 1].map((val, i) => <div key={i} className="w-1.5 bg-indigo-400 rounded-full animate-pulse" style={{ height: isSpeaking ? `${val * 6}px` : '4px', animationDelay: `${i * 0.1}s` }}></div>)}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={handlePlay} disabled={isGeneratingAudio} className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl font-bold transition-all ${isGeneratingAudio ? 'bg-slate-700' : 'bg-indigo-600 hover:bg-indigo-500'}`}>
                                            {isGeneratingAudio ? <Icon name="Loader2" /> : isSpeaking ? <Icon name="Activity" /> : <Icon name="Play" />} {isGeneratingAudio ? 'Proses...' : isSpeaking ? 'Membaca...' : 'Putar Suara'}
                                        </button>
                                        <button onClick={handleStop} className="p-4 bg-slate-800 rounded-2xl hover:bg-red-900 transition-colors"><Icon name="Square" /></button>
                                        <button onClick={handleDownload} disabled={!audioUrl} className={`p-4 rounded-2xl transition-all ${!audioUrl ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`} title="Download MP3/WAV">
                                            <Icon name="Download" />
                                        </button>
                                    </div>
                                </div>

                                <button onClick={handleCopy} className="w-full flex items-center justify-center gap-2 py-3 text-slate-500 font-semibold hover:text-indigo-600 transition-colors">
                                    {isCopied ? <Icon name="CheckCircle2" className="text-emerald-500" /> : <Icon name="Copy" />} {isCopied ? 'Tersalin!' : 'Salin Teks Skrip'}
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
